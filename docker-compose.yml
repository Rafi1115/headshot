services:
  frontend:
    build:
      context: ./frontend
      args:
        # This is critical: NEXT_PUBLIC_ variables must be set at build time
        - NEXT_PUBLIC_API_URL=https://api.quickheadshotai.com
    ports:
      - "3009:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: always

  backend:
    build:
      context: ./backend-django
    # Runs migrations then starts server to match user's CLI workflow
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8009"
    ports:
      - "8009:8009"
    env_file:
      - .env
    volumes:
      - ./backend-django/backend:/app
      - deepface_weights:/root/.deepface/weights
    depends_on:
      - redis
    networks:
      - app-network
    restart: always

  celery:
    build:
      context: ./backend-django
    # Matching user's CLI: --pool=solo
    command: celery -A config worker -l info --pool=solo
    env_file:
      - ./backend-django/backend/.env
      - .env
    volumes:
      - ./backend-django/backend:/app
      - deepface_weights:/root/.deepface/weights
    depends_on:
      - redis
      - backend
    networks:
      - app-network
    restart: always

  redis:
    image: redis:alpine
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  deepface_weights:

